<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caféine - Réservation</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4a373; --dark: #0f0a08; --cream: #f4e8d1; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--cream); min-height: 100vh; overflow-x: hidden; }
        
        .hero-bg { position: fixed; width: 100%; height: 100%; background: url('20260315_003359.jpg') center/cover; filter: brightness(0.3); z-index: -2; }
        .overlay { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, rgba(15,10,8,0.6) 0%, var(--dark) 100%); z-index: -1; }

        .top-nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
        .logo { font-family: 'Marcellus', serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; }
        .back-btn { text-decoration: none; color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 4px; transition: 0.3s; font-size: 0.8rem; }
        .back-btn:hover { background: var(--gold); color: var(--dark); }

        .content-wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; position: relative; z-index: 10; }
        h1 { font-family: 'Marcellus', serif; font-size: 3rem; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 10px; }
        .tagline { color: var(--gold); letter-spacing: 4px; text-transform: uppercase; font-size: 0.9rem; }
        .gold-line { width: 80px; height: 2px; background: var(--gold); margin: 20px auto; }

        .reservation-box { background: rgba(15, 10, 8, 0.8); border: 1px solid rgba(212, 163, 115, 0.2); padding: 40px; border-radius: 8px; width: 100%; max-width: 500px; backdrop-filter: blur(10px); }
        label { display: block; text-align: left; color: var(--gold); font-size: 0.8rem; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 163, 115, 0.3); color: var(--cream); border-radius: 4px; outline: none; }
        .btn-gold { width: 100%; background: var(--gold); color: var(--dark); padding: 15px; border-radius: 4px; font-weight: 600; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        .map-container { width: 100%; max-width: 800px; margin: 50px auto; padding: 0 20px; text-align: center; }
        iframe { width: 100%; height: 300px; border-radius: 8px; border: 1px solid var(--gold); filter: invert(90%) hue-rotate(180deg); }
    </style>
</head>
<body>

    <div class="hero-bg"></div>
    <div class="overlay"></div>

    <nav class="top-nav">
        <a href="p1.html" class="back-btn">RETOUR</a>
        <div class="logo">CAFÉINE</div>
        <div style="width:80px"></div>
    </nav>

    <div class="content-wrapper">
        <p class="tagline">Réservez votre table</p>
        <h1>Réservation</h1>
        <div class="gold-line"></div>

        <div class="reservation-box">
            <form action="https://formspree.io/f/ID_MTE3EK_MEN_FORMSPREE" method="POST">
                <label>Nom Complet</label>
                <input type="text" name="name" required placeholder="Votre nom">

                <label>Téléphone</label>
                <input type="tel" name="phone" required placeholder="N° Téléphone">

                <label>Date & Heure</label>
                <input type="datetime-local" name="date" required>

                <label>Personnes</label>
                <input type="number" name="guests" min="1" value="2">

                <button type="submit" class="btn-gold">Confirmer</button>
            </form>
        </div>
    </div>

    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3194.321!2d10.237!3d36.848!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzbCsDUwJzUyLjgiTiAxMMKwMTQnMTMuMiJF!5e0!3m2!1sfr!2stn!4v1620000000000!5m2!1sfr!2stn" allowfullscreen="" loading="lazy"></iframe>
    </div>

</body>
</html>
